name: Java CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-build-system:
    name: Detect Build System
    runs-on: ubuntu-latest
    outputs:
      has_gradle: ${{ steps.detect.outputs.has_gradle }}
      has_maven: ${{ steps.detect.outputs.has_maven }}
      is_android: ${{ steps.detect.outputs.is_android }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          echo "has_gradle=$([ -f build.gradle ] || [ -f build.gradle.kts ] || [ -f settings.gradle ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_maven=$([ -f pom.xml ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "is_android=$(grep -r 'com.android.application\|com.android.library' . --include='*.gradle' --include='*.gradle.kts' -l 2>/dev/null | head -1 | wc -l | xargs)" >> $GITHUB_OUTPUT

  build-gradle:
    name: Build & Test (Gradle)
    runs-on: ubuntu-latest
    needs: detect-build-system
    if: needs.detect-build-system.outputs.has_gradle == 'true'
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Android SDK
        if: needs.detect-build-system.outputs.is_android != '0'
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          if [ -f gradlew ]; then
            ./gradlew build --no-daemon --stacktrace
          else
            gradle build --no-daemon --stacktrace
          fi

      - name: Run tests
        run: |
          if [ -f gradlew ]; then
            ./gradlew test --no-daemon || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-gradle-java${{ matrix.java-version }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: warn

  build-maven:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    needs: detect-build-system
    if: needs.detect-build-system.outputs.has_maven == 'true'
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run tests
        run: mvn -B test || true

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: detect-build-system
    if: needs.detect-build-system.outputs.is_android != '0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Android Lint
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          if [ -f gradlew ]; then
            ./gradlew lint --no-daemon || true
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: "**/build/reports/lint-results*.html"
          if-no-files-found: warn
